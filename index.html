<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" id="meta-theme-color" content="#FFFFFF" />
    <meta name="description" content="Dimas Adimo - Design Engineer & Fullstack Engineer Portfolio" />
    <meta name="google-site-verification" content="YOUR_GOOGLE_SITE_VERIFICATION_KEY" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Dimas Adimo",
        "jobTitle": "Design Engineer & Fullstack Engineer",
        "url": "https://dimasadimo.com",
        "description": "Portfolio of Dimas Adimo, a Design Engineer and Fullstack Engineer specializing in React, UX, and fullstack development.",
        "knowsAbout": [
          "React",
          "Web Design",
          "Frontend Development",
          "UX/UI Design",
          "TypeScript"
        ]
      }
    </script>
    <title>Dimas Adimo</title>
    <script>
      (function() {
        const stored = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = stored || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        window.__setTheme = function(t) {
          document.documentElement.setAttribute('data-theme', t);
          localStorage.setItem('theme', t);
          document.getElementById('meta-theme-color')?.setAttribute('content', t === 'dark' ? '#0C1B3F' : '#FFFFFF');
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
